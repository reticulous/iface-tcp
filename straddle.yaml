# iface-tcp — RNS-over-TCP interface for reticulous.
#
# Outbound dial (via net's NET_PORT_TCP_DIAL) + inbound listen, HDLC
# byte-stuffing on the wire. Each connection registers as its own RNS
# interface with rnsd through RNSD_PORT_IFACE.
schema_version: 1
name: reticulous/iface-tcp
prefix: rns_tcp
version: 0.0.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
  - spangap/spangap-net
# Boot-registered services (folded into the generated boot registration).
# TcpService::onInit self-registers with rnsd via ITS; `requires: reticulous/rns`
# puts rnsd ahead of it in dependency-topo order, so its port surface is up
# first. TcpLcdService adds the on-device Settings pane, when:-gated on
# spangap-lcd (a hand-written peers-list editor too rich for a settings: block).
services:
  - { class: TcpService, header: tcp.h }
  - { class: TcpLcdService, header: tcp_lcd.h, when: spangap/spangap-lcd }

# Browser-side UI registration (parallel to services: above) — auto-wired into
# the buildable SPA via straddles.gen.ts; no web-interface edit needed.
browser_register:
  - call: registerTcp
    module: modules/tcp
