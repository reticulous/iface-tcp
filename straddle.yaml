# iface-tcp — RNS-over-TCP transport for reticulous.
#
# Outbound dial (via net's NET_PORT_TCP_DIAL) + inbound listen, HDLC
# byte-stuffing on the wire. Each peer registers as its own iface with
# rnsd through RNSD_PORT_TRANSPORT.
schema_version: 1
name: reticulous/iface-tcp
prefix: rns_tcp
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
  - spangap/spangap-net
# Auto-init: folded into the generated spangapInitStraddles() dispatcher.
# tcpInit() self-registers with rnsd via ITS; `requires: reticulous/rns` puts
# rnsd ahead of it in dependency-topo order, so its port surface is up first.
init:
  - call: tcpInit
  - call: tcpLcdRegister
    when: spangap/spangap-lcd
