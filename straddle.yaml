# iface-tcp — RNS-over-TCP interface for reticulous.
#
# Outbound dial (via net's NET_PORT_TCP_DIAL) + inbound listen, HDLC
# byte-stuffing on the wire. Each connection registers as its own RNS
# interface with rnsd through RNSD_PORT_IFACE.
schema_version: 1
name: reticulous/iface-tcp
prefix: rns_tcp
version: 0.0.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
  - spangap/spangap-net
# Auto-init: folded into the generated spangapInitStraddles() dispatcher.
# tcpInit() self-registers with rnsd via ITS; `requires: reticulous/rns` puts
# rnsd ahead of it in dependency-topo order, so its port surface is up first.
init:
  - call: tcpInit
  - call: tcpLcdRegister
    when: spangap/spangap-lcd

# Browser-side UI registration (parallel to init: above) — auto-wired into
# the buildable SPA via straddles.gen.ts; no web-interface edit needed.
browser_register:
  - call: registerTcp
    module: modules/tcp
